kind = "web"
previewPath = "/scanner/"
title = "Dodge Club Scanner"
version = "1.0.0"
id = "artifacts/scanner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/scanner/" ]
localPort = 21235

[services.development]
run = "pnpm --filter @workspace/scanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scanner", "run", "build" ]
publicDir = "artifacts/scanner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21235"
BASE_PATH = "/scanner/"
