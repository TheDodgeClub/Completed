packages:
  "framer-motion": "Animations for page transitions and interactive elements"
  "react-hook-form": "Form state management and validation"
  "@hookform/resolvers": "Zod resolver for react-hook-form"
  "zod": "Schema validation for API responses and forms"
  "date-fns": "Date formatting and manipulation"
  "clsx": "Utility for conditionally joining classNames"
  "tailwind-merge": "Utility to merge Tailwind classes without conflicts"
  "lucide-react": "Beautiful consistent icons"

images:
  - path: "artifacts/admin/public/images/login-bg.png"
    description: "Cinematic, moody dark dodgeball arena with volumetric red lighting, subtle glowing lines, professional sports photography, high contrast, dark mode aesthetic"
    aspect_ratio: "16:9"

notes:
  - The admin dashboard runs on a proxy to the api-server, so API paths use relative `/api/admin/*`
  - Wouter is used for routing, `<Link>` tags must not wrap `<a>` tags
  - Custom Tailwind v4 configuration enforces a strict dark mode aesthetic with Dodge Club brand colors (Red/Black/Gold)
